[program:postgres]
command=bash -c "pgrep -x postgres > /dev/null || su postgres -c '/usr/lib/postgresql/14/bin/postgres -D /var/lib/postgresql/data'"
user=root
autostart=true
autorestart=false
priority=100
stdout_logfile=/var/log/supervisor/postgres.log
stderr_logfile=/var/log/supervisor/postgres_err.log
stdout_logfile_maxbytes=10MB
stderr_logfile_maxbytes=10MB
directory=/tmp
stopwaitsecs=10
